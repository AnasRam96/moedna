<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d0811">
<title>موعدنا</title>
<style>
:root{--cream:#fff1e9;--muted:#d9c2c4;--glass:rgba(25,13,30,.74)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:#0d0811;color:#fff}
body{overflow-x:hidden}
.scene{min-height:100svh;position:relative;display:flex;align-items:center;justify-content:center;padding:52px 18px 30px;overflow:hidden;background:radial-gradient(circle at 73% 25%,rgba(178,82,120,.22),transparent 31%),radial-gradient(circle at 14% 86%,rgba(110,45,80,.22),transparent 34%),linear-gradient(180deg,#09070e 0%,#211225 54%,#100914 100%)}
.scene:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 58%,rgba(8,4,12,.78));pointer-events:none}
.stars{position:absolute;inset:0;pointer-events:none}.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;box-shadow:0 0 7px #fff;animation:twinkle 3.4s ease-in-out infinite}@keyframes twinkle{0%,100%{opacity:.18;transform:scale(.8)}50%{opacity:.9;transform:scale(1.25)}}
.moon{position:absolute;top:7%;right:8%;width:58px;height:58px;border-radius:50%;box-shadow:-12px 0 0 #ffd7c6;filter:drop-shadow(0 0 16px rgba(255,215,198,.34));opacity:.9}
.rose-wrap{position:absolute;left:-20px;bottom:-28px;width:min(42vw,350px);height:min(58vh,560px);opacity:.82;filter:drop-shadow(0 25px 45px rgba(0,0,0,.5));z-index:1}
.dome{position:absolute;left:12%;bottom:9%;width:76%;height:78%;border-radius:48% 48% 18% 18%/33% 33% 12% 12%;border:2px solid rgba(255,236,229,.26);background:linear-gradient(100deg,rgba(255,255,255,.08),rgba(255,255,255,.015) 44%,rgba(255,255,255,.05));box-shadow:inset 12px 0 24px rgba(255,255,255,.05),0 0 35px rgba(225,135,138,.09);overflow:hidden}.dome:before{content:"";position:absolute;top:6%;left:16%;width:9%;height:68%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);filter:blur(2px);transform:rotate(7deg)}
.base{position:absolute;left:5%;bottom:2%;width:90%;height:12%;border-radius:50%;background:linear-gradient(180deg,#4b2d2b,#211313 55%,#0e0809);box-shadow:0 12px 25px rgba(0,0,0,.55),inset 0 2px 4px rgba(255,222,184,.22)}
.stem{position:absolute;left:49%;bottom:16%;width:5px;height:51%;background:linear-gradient(90deg,#18321d,#48633a,#132718);border-radius:5px;transform:rotate(-2deg)}
.leaf{position:absolute;width:61px;height:29px;background:linear-gradient(145deg,#3f6540,#172b1d);border-radius:100% 0 100% 0;filter:drop-shadow(0 5px 5px rgba(0,0,0,.28))}.l1{left:47%;bottom:42%;transform:rotate(-26deg)}.l2{left:29%;bottom:34%;transform:scaleX(-1) rotate(-28deg)}.l3{left:46%;bottom:25%;transform:rotate(-18deg) scale(.8)}
.flower{position:absolute;left:29%;bottom:63%;width:112px;height:102px;filter:drop-shadow(0 12px 12px rgba(0,0,0,.35))}.petal-shape{position:absolute;left:50%;top:52%;width:62px;height:50px;margin-left:-31px;margin-top:-25px;border-radius:62% 38% 58% 42%;background:radial-gradient(circle at 60% 35%,#eeabb0,#b64e62 50%,#6f2637 85%);transform-origin:center}.p1{transform:rotate(0deg) translateY(-17px)}.p2{transform:rotate(58deg) translateY(-17px)}.p3{transform:rotate(116deg) translateY(-17px)}.p4{transform:rotate(174deg) translateY(-17px)}.p5{transform:rotate(232deg) translateY(-17px)}.p6{transform:rotate(290deg) translateY(-17px)}.core{position:absolute;left:33px;top:29px;width:46px;height:43px;border-radius:50%;background:radial-gradient(circle at 48% 42%,#f4b0b4,#a84257 58%,#5f2132)}
.light{position:absolute;width:5px;height:5px;border-radius:50%;background:#ffd39b;box-shadow:0 0 10px 3px #ffc978;animation:glow 2.5s ease-in-out infinite}.g1{left:31%;bottom:23%}.g2{left:64%;bottom:31%;animation-delay:.5s}.g3{left:35%;bottom:49%;animation-delay:1s}.g4{left:66%;bottom:56%;animation-delay:1.4s}.g5{left:50%;bottom:18%;animation-delay:1.8s}@keyframes glow{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.22)}}
.content{position:relative;z-index:4;width:min(700px,100%);margin-right:min(20vw,150px);text-align:center}.kicker{font-size:14px;letter-spacing:.07em;color:#e8c8c9;margin-bottom:8px}h1{font-size:clamp(56px,12vw,92px);line-height:.95;margin:0;font-weight:850;text-shadow:0 8px 30px rgba(0,0,0,.45)}.date{margin-top:12px;font-size:clamp(22px,5vw,34px);font-weight:750;letter-spacing:.1em;color:#ffd8c8}.tagline{margin:18px auto 26px;max-width:580px;font-size:clamp(17px,3.9vw,23px);line-height:1.8;color:#faece7}
.card{width:100%;padding:20px 17px 18px;border-radius:28px;background:linear-gradient(180deg,rgba(32,17,37,.66),rgba(17,9,22,.86));border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 25px 70px rgba(0,0,0,.4),inset 0 1px rgba(255,255,255,.05)}.card-title{font-size:15px;color:#e8cdca;margin-bottom:15px}.countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;direction:ltr}.unit{padding:16px 5px 13px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.085);direction:rtl}.num{display:block;font-size:clamp(31px,7.5vw,54px);font-weight:850;line-height:1;font-variant-numeric:tabular-nums}.label{display:block;margin-top:9px;font-size:12px;color:#d7c1c2}.message{margin-top:16px;padding-top:15px;border-top:1px solid rgba(255,255,255,.09);min-height:52px;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,3.5vw,19px);line-height:1.7;color:#f4dfdb;transition:.35s}.footer{margin-top:15px;color:#cbb2b4;font-size:13px}
@media(max-width:700px){.scene{align-items:flex-end;padding-top:68px;min-height:100svh}.content{margin-right:0;width:100%;padding-bottom:4px}.rose-wrap{width:54vw;height:48vh;left:-78px;bottom:-8px;opacity:.45}.moon{width:50px;height:50px;box-shadow:-10px 0 0 #ffd7c6;top:5%;right:8%}.tagline{max-width:92%;margin-bottom:22px}.card{border-radius:24px;padding:17px 12px 15px}.countdown{gap:7px}.unit{border-radius:17px;padding:14px 3px 12px}}
</style>
</head>
<body>
<div class="scene">
<div class="stars" id="stars"></div><div class="moon"></div>
<div class="rose-wrap"><div class="dome"><div class="stem"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="flower"><i class="petal-shape p1"></i><i class="petal-shape p2"></i><i class="petal-shape p3"></i><i class="petal-shape p4"></i><i class="petal-shape p5"></i><i class="petal-shape p6"></i><i class="core"></i></div><i class="light g1"></i><i class="light g2"></i><i class="light g3"></i><i class="light g4"></i><i class="light g5"></i></div><div class="base"></div></div>
<main class="content"><div class="kicker">قريبًا تبدأ الحكاية</div><h1>موعدنا</h1><div class="date">01.08.2026</div><div class="tagline">كل يوم يمرّ… يقربنا أكثر من لحظة انتظرناها بحماس 🌹</div><section class="card"><div class="card-title" id="title">الوقت الباقي حتى موعدنا</div><div class="countdown"><div class="unit"><span class="num" id="days">00</span><span class="label">يوم</span></div><div class="unit"><span class="num" id="hours">00</span><span class="label">ساعة</span></div><div class="unit"><span class="num" id="minutes">00</span><span class="label">دقيقة</span></div><div class="unit"><span class="num" id="seconds">00</span><span class="label">ثانية</span></div></div><div class="message" id="message">بقي القليل… واللحظات الحلوة صارت أقرب.</div></section><div class="footer">01.08 — موعد لبداية جميلة 🌹</div></main>
</div>
<script>
(()=>{const target=new Date(2026,7,1,0,0,0).getTime(),D=document.getElementById('days'),H=document.getElementById('hours'),M=document.getElementById('minutes'),S=document.getElementById('seconds'),pad=n=>String(n).padStart(2,'0');function tick(){let x=target-Date.now();if(x<=0){D.textContent=H.textContent=M.textContent=S.textContent='00';document.getElementById('title').textContent='وصل موعدنا';document.getElementById('message').textContent='وأخيرًا وصل اليوم… خلينا نبدأ أجمل فصل 🌹';return}const d=Math.floor(x/86400000);x%=86400000;const h=Math.floor(x/3600000);x%=3600000;const m=Math.floor(x/60000),s=Math.floor(x%60000/1000);D.textContent=pad(d);H.textContent=pad(h);M.textContent=pad(m);S.textContent=pad(s)}tick();setInterval(tick,1000);const msgs=['بقي القليل… واللحظات الحلوة صارت أقرب.','كل ثانية تمرّ… تقربنا من أول جلسة حقيقية.','قريبًا سنحكي براحتنا… ونترك البداية تأخذ وقتها.','أجمل البدايات أحيانًا تبدأ بموعد بسيط.','العد التنازلي شغال… والحماس عم يزيد.','موعدنا صار أقرب مما كان… والباقي أجمل.'],msg=document.getElementById('message');let i=0;setInterval(()=>{msg.style.opacity='0';msg.style.transform='translateY(5px)';setTimeout(()=>{i=(i+1)%msgs.length;msg.textContent=msgs[i];msg.style.opacity='1';msg.style.transform='translateY(0)'},350)},5000);const stars=document.getElementById('stars');for(let i=0;i<42;i++){const s=document.createElement('i');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*72+'%';s.style.animationDelay=Math.random()*3.4+'s';stars.appendChild(s)}})();
</script>
</body>
</html>
