<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0c0710">
<title>موعدنا</title>
<style>
:root{--cream:#fff0e7;--rose:#d67d8d;--glass:rgba(24,12,29,.7)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:#0c0710;color:#fff}body{overflow-x:hidden}.scene{min-height:100svh;position:relative;display:flex;align-items:center;justify-content:center;padding:48px 18px 28px;overflow:hidden;background:radial-gradient(circle at 72% 25%,rgba(184,92,127,.24),transparent 30%),radial-gradient(circle at 14% 85%,rgba(112,49,81,.25),transparent 34%),linear-gradient(180deg,#09070e 0%,#221326 52%,#100914 100%)}.scene:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(8,4,12,.75));pointer-events:none}.stars{position:absolute;inset:0;pointer-events:none}.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;box-shadow:0 0 8px #fff;animation:twinkle 3s ease-in-out infinite}.moon{position:absolute;top:7%;right:8%;width:64px;height:64px;border-radius:50%;box-shadow:-13px 0 0 #ffd7c6;filter:drop-shadow(0 0 16px rgba(255,215,198,.38));opacity:.9}.rose-wrap{position:absolute;left:-15px;bottom:-20px;width:min(46vw,380px);height:min(65vh,620px);opacity:.9;filter:drop-shadow(0 26px 45px rgba(0,0,0,.5));z-index:1}.dome{position:absolute;left:12%;bottom:9%;width:76%;height:78%;border-radius:48% 48% 18% 18%/33% 33% 12% 12%;border:2px solid rgba(255,236,229,.28);background:linear-gradient(100deg,rgba(255,255,255,.08),rgba(255,255,255,.015) 44%,rgba(255,255,255,.05));box-shadow:inset 12px 0 24px rgba(255,255,255,.05),inset -10px 0 22px rgba(255,255,255,.03),0 0 35px rgba(225,135,138,.1);overflow:hidden}.dome:before{content:"";position:absolute;top:6%;left:16%;width:10%;height:68%;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);filter:blur(2px);transform:rotate(7deg)}.base{position:absolute;left:5%;bottom:2%;width:90%;height:12%;border-radius:50%;background:linear-gradient(180deg,#4e302c,#211313 55%,#0e0809);box-shadow:0 12px 25px rgba(0,0,0,.55),inset 0 2px 4px rgba(255,222,184,.25)}.stem{position:absolute;left:49%;bottom:16%;width:5px;height:52%;background:linear-gradient(90deg,#18321d,#48633a,#132718);border-radius:5px;transform:rotate(-2deg)}.leaf{position:absolute;width:64px;height:31px;background:linear-gradient(145deg,#3f6540,#172b1d);border-radius:100% 0 100% 0;filter:drop-shadow(0 5px 5px rgba(0,0,0,.28))}.l1{left:47%;bottom:42%;transform:rotate(-26deg)}.l2{left:29%;bottom:34%;transform:scaleX(-1) rotate(-28deg)}.l3{left:46%;bottom:25%;transform:rotate(-18deg) scale(.8)}.flower{position:absolute;left:29%;bottom:63%;width:116px;height:105px;filter:drop-shadow(0 12px 12px rgba(0,0,0,.35))}.petal-shape{position:absolute;left:50%;top:52%;width:64px;height:52px;margin-left:-32px;margin-top:-26px;border-radius:62% 38% 58% 42%;background:radial-gradient(circle at 60% 35%,#eeabb0,#b64e62 50%,#6f2637 85%);transform-origin:center}.p1{transform:rotate(0deg) translateY(-17px)}.p2{transform:rotate(58deg) translateY(-17px)}.p3{transform:rotate(116deg) translateY(-17px)}.p4{transform:rotate(174deg) translateY(-17px)}.p5{transform:rotate(232deg) translateY(-17px)}.p6{transform:rotate(290deg) translateY(-17px)}.core{position:absolute;left:34px;top:30px;width:48px;height:45px;border-radius:50%;background:radial-gradient(circle at 48% 42%,#f4b0b4,#a84257 58%,#5f2132);box-shadow:inset 0 0 0 8px rgba(89,29,43,.16)}.light{position:absolute;width:5px;height:5px;border-radius:50%;background:#ffd39b;box-shadow:0 0 10px 3px #ffc978;animation:glow 2.4s ease-in-out infinite}.g1{left:31%;bottom:23%}.g2{left:64%;bottom:31%;animation-delay:.5s}.g3{left:35%;bottom:49%;animation-delay:1s}.g4{left:66%;bottom:56%;animation-delay:1.4s}.g5{left:50%;bottom:18%;animation-delay:1.8s}@keyframes glow{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.25)}}.content{position:relative;z-index:4;width:min(690px,100%);margin-right:min(22vw,170px);text-align:center}.kicker{font-size:14px;letter-spacing:.06em;color:#e7c7c8;margin-bottom:8px}h1{font-size:clamp(54px,12vw,92px);line-height:.95;margin:0;font-weight:850;text-shadow:0 8px 30px rgba(0,0,0,.45)}.date{margin-top:12px;font-size:clamp(22px,5vw,34px);font-weight:750;letter-spacing:.1em;color:#ffd8c8}.tagline{margin:19px auto 27px;max-width:560px;font-size:clamp(16px,3.8vw,22px);line-height:1.8;color:#faece7}.card{width:100%;padding:20px 17px 18px;border-radius:28px;background:linear-gradient(180deg,rgba(32,17,37,.64),rgba(17,9,22,.84));border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 25px 70px rgba(0,0,0,.4),inset 0 1px rgba(255,255,255,.05)}.card-title{font-size:15px;color:#e8cdca;margin-bottom:15px}.countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;direction:rtl}.unit{padding:16px 5px 13px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.085)}.num{display:block;font-size:clamp(31px,7.5vw,54px);font-weight:850;line-height:1;font-variant-numeric:tabular-nums}.label{display:block;margin-top:9px;font-size:12px;color:#d7c1c2}.message{margin-top:16px;padding-top:15px;border-top:1px solid rgba(255,255,255,.09);min-height:50px;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,3.4vw,18px);line-height:1.7;color:#f4dfdb;transition:.35s}.footer{margin-top:15px;color:#cbb2b4;font-size:13px}.falling{position:absolute;top:-10vh;z-index:3;pointer-events:none;opacity:.65;animation:fall linear infinite}@keyframes fall{to{transform:translate3d(var(--x),115vh,0) rotate(540deg)}}@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.35)}}
@media(max-width:700px){.scene{align-items:flex-end;padding-top:74px;min-height:100svh}.content{margin-right:0;width:100%;padding-bottom:3px}.rose-wrap{width:60vw;height:54vh;left:-80px;bottom:-10px;opacity:.56}.moon{width:52px;height:52px;box-shadow:-11px 0 0 #ffd7c6;top:5%;right:8%}.tagline{max-width:92%;margin-bottom:22px}.card{border-radius:24px;padding:17px 12px 15px}.countdown{gap:7px}.unit{border-radius:17px;padding:14px 3px 12px}}
</style>
</head>
<body>
<div class="scene">
<div class="stars" id="stars"></div><div class="moon"></div>
<div class="rose-wrap"><div class="dome"><div class="stem"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="flower"><i class="petal-shape p1"></i><i class="petal-shape p2"></i><i class="petal-shape p3"></i><i class="petal-shape p4"></i><i class="petal-shape p5"></i><i class="petal-shape p6"></i><i class="core"></i></div><i class="light g1"></i><i class="light g2"></i><i class="light g3"></i><i class="light g4"></i><i class="light g5"></i></div><div class="base"></div></div>
<main class="content"><div class="kicker">لحظة ننتظرها بهدوء</div><h1>موعدنا</h1><div class="date">01.08.2026</div><div class="tagline">بعض اللحظات الجميلة ما بدها استعجال… بدها وقتها المناسب 🌹</div><section class="card"><div class="card-title" id="title">الوقت الباقي حتى موعدنا</div><div class="countdown"><div class="unit"><span class="num" id="days">00</span><span class="label">يوم</span></div><div class="unit"><span class="num" id="hours">00</span><span class="label">ساعة</span></div><div class="unit"><span class="num" id="minutes">00</span><span class="label">دقيقة</span></div><div class="unit"><span class="num" id="seconds">00</span><span class="label">ثانية</span></div></div><div class="message" id="message">خلي قلبك مرتاح… كل شيء بيجي بوقته.</div></section><div class="footer">إلى أن يحين موعدنا… 🌹</div></main></div>
<script>
(()=>{const target=new Date(2026,7,1,0,0,0).getTime(),D=document.getElementById('days'),H=document.getElementById('hours'),M=document.getElementById('minutes'),S=document.getElementById('seconds'),pad=n=>String(n).padStart(2,'0');function tick(){let x=target-Date.now();if(x<=0){D.textContent=H.textContent=M.textContent=S.textContent='00';document.getElementById('title').textContent='وصل موعدنا';document.getElementById('message').textContent='صار الوقت… والباقي منحكيه سوا 🌹';return}const d=Math.floor(x/86400000);x%=86400000;const h=Math.floor(x/3600000);x%=3600000;const m=Math.floor(x/60000),s=Math.floor(x%60000/1000);D.textContent=pad(d);H.textContent=pad(h);M.textContent=pad(m);S.textContent=pad(s)}tick();setInterval(tick,1000);const msgs=['خلي قلبك مرتاح… كل شيء بيجي بوقته.','كل يوم جديد يحمل معه شيئًا جميلًا.','الأشياء الحلوة تستحق قليلًا من الصبر.','ابتسمي… يمكن بكرا يكون أجمل مما تتخيلي.','الهدوء أحيانًا أجمل طريقة للانتظار.'],msg=document.getElementById('message');let i=0;setInterval(()=>{msg.style.opacity='0';msg.style.transform='translateY(5px)';setTimeout(()=>{i=(i+1)%msgs.length;msg.textContent=msgs[i];msg.style.opacity='1';msg.style.transform='translateY(0)'},350)},5200);const stars=document.getElementById('stars');for(let i=0;i<75;i++){const s=document.createElement('i');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*75+'%';s.style.animationDelay=Math.random()*3+'s';stars.appendChild(s)}for(let i=0;i<8;i++){const p=document.createElement('span');p.className='falling';p.textContent='🌹';p.style.left=Math.random()*100+'%';p.style.fontSize=9+Math.random()*7+'px';p.style.animationDuration=12+Math.random()*10+'s';p.style.animationDelay=-Math.random()*20+'s';p.style.setProperty('--x',Math.random()*110-55+'px');document.body.appendChild(p)}})();
</script>
</body></html>
